// Create the Kopernicus-like structure if it doesn't exist
// Planet packs will fill this in, to configure station locations
Kopernicus:NEEDS[!Kopernicus]
{
    Body { name = Kerbin }
}

//Adjust power draw for stock-scale performance.
//OPM distances are ~5x stock max, so ~5x less penalty than the /750 default.
//leave idle power alone, stock doesn't even have idle power
@RealAntennasCommNetParams:FOR[RealAntennas]:NEEDS[!RealSolarSystem,!RealismOverhaul]
{
    @TechLevelInfo,*
    {
        @PowerEfficiency /= 100
    }
}


@Kopernicus:HAS[@Body[Kerbin]]:FIRST
{
    @Body[Kerbin]
    {
        %PQS
        {
            %Mods {}
        }
    }
}

// Late-pass configuration of antenna parameters at stations
@Kopernicus:FOR[zRealAntennas]
{
    @Body[Kerbin]
    {
        @PQS
        {
            @Mods
            {
                @City2[*TrackingStation],*
                {
                    %commnetStation = False
                    RACommNetStation = True
                    %icon = RealAntennas/radio-antenna
                    //Every station gets a basic VHF & UHF omni for launch tracking and control
                    Antenna
                    {
                        referenceGain = 1.5
                        referenceFrequency = 150
                        TxPower = 40                // 10W
                        TechLevel = 0
                        RFBand = VHF
                        AMWTemp = 290
                        ModulationBits = 1          // BPSK only

                        UPGRADE
                        {
                            referenceGain = 3
                            TechLevel = 3
                            ModulationBits = 2
                        }
                        UPGRADE
                        {
                            referenceGain = 6
                            TechLevel = 7
                            AMWTemp = 125
                        }
                        UPGRADE
                        {
                            TechLevel = 8
                            ModulationBits = 3
                        }
                    }
                    Antenna
                    {
                        referenceGain = 2.0
                        referenceFrequency = 430
                        TxPower = 40
                        TechLevel = 0
                        RFBand = UHF
                        AMWTemp = 290
                        ModulationBits = 1

                        UPGRADE
                        {
                            referenceGain = 4
                            TechLevel = 3
                            ModulationBits = 2
                        }
                        UPGRADE
                        {
                            referenceGain = 8
                            TechLevel = 7
                            AMWTemp = 125
                        }
                        UPGRADE
                        {
                            TechLevel = 8
                            ModulationBits = 3
                        }
                    }
                }
                @City2[NKNTrackingStation],*
                {
                    Antenna
                    {
                        referenceGain = 35
                        referenceFrequency = 2250
                        TxPower = 50
                        TechLevel = 3               // Basic Science
                        RFBand = S
                        AMWTemp = 150
                        ModulationBits = 1

                        UPGRADE
                        {
                            TechLevel = 3           // Basic Science
                            ModulationBits = 2
                        }
                        UPGRADE
                        {
                            TechLevel = 5           // Precision Engineering
                            AMWTemp = 100
                        }
                        UPGRADE
                        {
                            TechLevel = 7           // Automation
                            ModulationBits = 3
                        }
                        UPGRADE
                        {
                            TechLevel = 9           // Experimental Electronics
                            AMWTemp = 25
                        }
                    }
                    Antenna
                    {
                        referenceGain = 50
                        referenceFrequency = 8450
                        TxPower = 55
                        TechLevel = 7               // Automation
                        RFBand = X
                        AMWTemp = 60
                        ModulationBits = 2

                        UPGRADE
                        {
                            TechLevel = 8           // Experimental Electrics
