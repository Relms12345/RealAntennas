                        }
                    }
                }
                @City2[DSNTrackingStation],*
                {
                    %icon = RealAntennas/DSN
                    @Antenna:HAS[#RFBand[VHF]],*
                    {
                        @referenceGain = 20         // DSN gets some array
                        @TxPower = 50
                    }
                    @Antenna:HAS[#RFBand[UHF]],*
                    {
                        @referenceGain = 20
                        @TxPower = 50
                    }
                    Antenna
                    {
                        referenceGain = 49          // Original S-Band 18m
                        referenceFrequency = 2250
                        TxPower = 63                // 2KW
                        TechLevel = 3               // Basic Science
                        RFBand = S
                        AMWTemp = 125
                        ModulationBits = 1

                        UPGRADE
                        {
                            TechLevel = 3           // Basic Science
                            ModulationBits = 2
                        }
                        UPGRADE
                        {
                            TechLevel = 5           // Precision Engineering
                            AMWTemp = 80
                        }
                        UPGRADE
                        {
                            TechLevel = 7           // Automation
                            ModulationBits = 3
                        }
                        UPGRADE
                        {
                            TechLevel = 9           // Experimental Electronics
                            AMWTemp = 17.6
                        }
                    }
                    Antenna
                    {
                        referenceGain = 68          // X-Band 34m
                        referenceFrequency = 8450
                        TxPower = 60                // 1KW
                        TechLevel = 7               // Automation
                        RFBand = X
                        AMWTemp = 40
                        ModulationBits = 2

                        UPGRADE
                        {
                            TechLevel = 8           // Experimental Electrics
                            ModulationBits = 3
                        }
                        UPGRADE
                        {
                            TechLevel = 9           // Experimental Electronics
                            AMWTemp = 12.8
                        }
                    }
                    Antenna
                    {
                        referenceGain = 72          // Ku-Band 34m
                        referenceFrequency = 14300
                        TxPower = 54                // 300W
                        TechLevel = 8               // Experimental Electrics
                        RFBand = Ku
                        AMWTemp = 50
                        ModulationBits = 2

                        UPGRADE
                        {
                            TechLevel = 8           // Experimental Electrics
                            ModulationBits = 3
                        }
                        UPGRADE
                        {
                            TechLevel = 9           // Experimental Electronics
                            AMWTemp = 25
                        }
                        UPGRADE
                        {
                            TechLevel = 10          // Modern Comms
                            ModulationBits = 4
                        }
                    }
                    Antenna
                    {
                        referenceGain = 79          // Ka-Band 34m
                        referenceFrequency = 32000
                        TxPower = 54.8              // 300W
                        TechLevel = 9               // Experimental Electronics
                        RFBand = Ka
                        AMWTemp = 20
                        ModulationBits = 2

