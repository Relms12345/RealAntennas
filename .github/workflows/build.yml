name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  validate-cfg-files:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
        with:
          fetch-depth: 1
      - name: Validate config files
        uses: KSP-CKAN/KSPMMCfgParser@master
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 100

      - name: Extract KSP assemblies
        id: download-assemblies
        run: |
          KSP_DLL_PATH="/opt/ksp/assembly"
          echo "ksp-dll-path=${KSP_DLL_PATH}" >> $GITHUB_OUTPUT
          mkdir -p "${KSP_DLL_PATH}"
          unzip -q "${GITHUB_WORKSPACE}/ksp.zip" -d "/tmp/ksp_extract"
          mv /tmp/ksp_extract/KSP_x64_Data/Managed/* "${KSP_DLL_PATH}/"
          rm -rf /tmp/ksp_extract
      # Install .NET SDKs
      - name: Setup .NET Core 3.1
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 3.1.x
      - name: Setup .NET 5.0
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 5.0.x

      - name: Setup CKAN
        uses: KSPModdingLibs/KSPBuildTools/.github/actions/setup-ckan@2135acc95e3a2ecc021dbedfdb0f41066b066b4e

      - name: Install mod dependencies via CKAN
        uses: KSPModdingLibs/KSPBuildTools/.github/actions/install-dependencies@2135acc95e3a2ecc021dbedfdb0f41066b066b4e
        with:
          dependency-identifiers: "ClickThroughBlocker KSPCommunityFixes"

      - name: Copy mod DLLs to assembly path
        run: |
          find "$KSP_ROOT/GameData" -name "ClickThroughBlocker.dll" -exec cp {} "${{ steps.download-assemblies.outputs.ksp-dll-path }}/" \;
          find "$KSP_ROOT/GameData" -name "KSPCommunityFixes.dll" -exec cp {} "${{ steps.download-assemblies.outputs.ksp-dll-path }}/" \;

      - name: Update AssemblyInfo
        uses: KSP-RO/BuildTools/update-assembly-info@master
        with:
          path: ${GITHUB_WORKSPACE}/src/RealAntennasProject/Properties/AssemblyInfo.cs
          tag: "2.99.0.0"

      - name: Build mod solution
        run: |
          msbuild ${GITHUB_WORKSPACE}/src/RealAntennasProject.sln /t:build /restore /p:RestorePackagesConfig=true /p:Configuration=Release /p:ReferencePath="${{ steps.download-assemblies.outputs.ksp-dll-path }}"
          
      - name: Remove excess DLLs
        uses: KSP-RO/BuildTools/remove-excess-dlls@master
        with:
          path: ${GITHUB_WORKSPACE}/GameData/

      - name: Assemble release
        id: assemble-release
        run: |
          RELEASE_DIR="${RUNNER_TEMP}/release"
          echo "Release dir: ${RELEASE_DIR}"
          mkdir -v "${RELEASE_DIR}"
          echo "::set-output name=release-dir::${RELEASE_DIR}"
          cp -v -R "${GITHUB_WORKSPACE}/GameData/RealAntennas" "${RELEASE_DIR}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RealAntennas
          path: ${{ steps.assemble-release.outputs.release-dir }}
